---
# Postgres S3 Backup
#
# Deploy this in the SAME SDL as the Postgres database you want backed
# up. Akash's internal networking lets the backup container reach
# Postgres by service name
#
# This file is a standalone example (database + backup service). In
# practice you'll usually merge the "postgres-s3-backup" service block below
# into an SDL that already has your app + database. See the README
# for the merge steps
#
# Fill in the placeholders below, then deploy. Backups run immediately
# on startup, then on the cron schedule baked into the image (default
# every 6 hours).

version: "2.0"

services:
  postgres:
    image: postgres:15
    expose:
      - port: 5432
        to:
          - service: postgres-s3-backup
          # add other services here that also need DB access, e.g.:
          # - service: web
    env:
      - POSTGRES_PASSWORD=CHANGE_ME_STRONG_PASSWORD
      - POSTGRES_DB=mydatabase
      - PGDATA=/var/lib/postgresql/data/pgdata
    params:
      storage:
        data:
          mount: /var/lib/postgresql/data
          readOnly: false

  postgres-s3-backup:
    image: YOUR_DOCKERHUB_USERNAME/postgres-s3-backup:latest
    env:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=CHANGE_ME_STRONG_PASSWORD
      # S3-compatible storage: Backblaze B2, Cloudflare R2, AWS S3, MinIO, etc.
      - S3_ENDPOINT=https://YOUR_ENDPOINT
      - S3_BUCKET=YOUR_BUCKET_NAME
      - S3_ACCESS_KEY=YOUR_ACCESS_KEY
      - S3_SECRET_KEY=YOUR_SECRET_KEY
      # Optional tuning (defaults shown):
      # - BACKUP_PREFIX=backups
      # - BACKUP_NAME=mydatabase
      # - LOCAL_RETENTION_COUNT=3
      # - REMOTE_RETENTION_DAYS=30

profiles:
  compute:
    postgres:
      resources:
        cpu:
          units: 1
        memory:
          size: 1Gi
        storage:
          - size: 1Gi
          - name: data
            size: 5Gi
            attributes:
              persistent: true
              class: beta3

    postgres-s3-backup:
      resources:
        cpu:
          units: 1
        memory:
          size: 512Mi
        storage:
          - size: 2Gi

  placement:
    dcloud:
      pricing:
        postgres:
          denom: uact
          amount: 10000
        postgres-s3-backup:
          denom: uact
          amount: 5000

deployment:
  postgres:
    dcloud:
      profile: postgres
      count: 1

  postgres-s3-backup:
    dcloud:
      profile: postgres-s3-backup
      count: 1
