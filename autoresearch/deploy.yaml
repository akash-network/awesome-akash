---
version: "2.0"
services:
  autoresearch:
    image: nvidia/cuda:12.6.3-devel-ubuntu24.04
    expose:
      - port: 3000
        as: 80
        to:
          - global: true
    command:
      - bash
      - "-c"
    args:
      - >-
        apt-get update && apt-get install -y curl git &&
        curl -LsSf https://astral.sh/uv/install.sh | sh &&
        export PATH="$HOME/.local/bin:$PATH" &&
        cd /workspace &&
        git clone https://github.com/karpathy/autoresearch.git &&
        cd autoresearch &&
        uv sync &&
        echo "==> Running data preparation (one-time)..." &&
        uv run prepare.py &&
        echo "==> Starting training run (5-minute budget)..." &&
        uv run train.py
    env:
      - "NVIDIA_VISIBLE_DEVICES=all"
    params:
      storage:
        shm:
          mount: /dev/shm
        data:
          mount: /workspace
          readOnly: false

profiles:
  compute:
    autoresearch:
      resources:
        cpu:
          units: 8
        memory:
          size: 32Gi
        storage:
          - size: 50Gi
          - name: data
            size: 100Gi
            attributes:
              persistent: true
              class: beta3
          - name: shm
            size: 16Gi
            attributes:
              class: ram
              persistent: false
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: h100
                - model: a100
  placement:
    dcloud:
      pricing:
        autoresearch:
          denom: uakt
          amount: 100000
deployment:
  autoresearch:
    dcloud:
      profile: autoresearch
      count: 1
