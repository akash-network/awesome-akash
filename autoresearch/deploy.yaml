---
version: "2.0"
services:
  autoresearch:
    image: nvidia/cuda:12.6.2-devel-ubuntu22.04
    expose:
      - port: 22
        as: 22
        to:
          - global: true
    command:
      - bash
      - "-c"
    args:
      - >-
        apt-get update && apt-get install -y curl git openssh-server &&
        mkdir -p /run/sshd &&
        mkdir -p /root/.ssh && chmod 700 /root/.ssh &&
        if [ -n "$SSH_PUBKEY" ]; then
          echo "$SSH_PUBKEY" >> /root/.ssh/authorized_keys;
          chmod 600 /root/.ssh/authorized_keys;
        fi &&
        curl -LsSf https://astral.sh/uv/install.sh | sh &&
        export PATH="$HOME/.local/bin:$PATH" &&
        echo 'export PATH="$HOME/.local/bin:$PATH"' >> /root/.bashrc &&
        cd /workspace &&
        if [ ! -d "autoresearch" ]; then
          git clone https://github.com/karpathy/autoresearch.git;
        fi &&
        cd autoresearch &&
        git pull &&
        uv sync &&
        echo "==> Running data preparation..." &&
        uv run prepare.py &&
        echo "==> Environment ready. Connect via SSH to start the agent loop." &&
        /usr/sbin/sshd -D
    env:
      - "NVIDIA_VISIBLE_DEVICES=all"
      - "SSH_PUBKEY="
    params:
      storage:
        shm:
          mount: /dev/shm
        data:
          mount: /workspace
          readOnly: false

profiles:
  compute:
    autoresearch:
      resources:
        cpu:
          units: 8
        memory:
          size: 32Gi
        storage:
          - size: 50Gi
          - name: data
            size: 100Gi
            attributes:
              persistent: true
              class: beta3
          - name: shm
            size: 16Gi
            attributes:
              class: ram
              persistent: false
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: h100
                - model: a100
  placement:
    dcloud:
      pricing:
        autoresearch:
          denom: uakt
          amount: 100000
deployment:
  autoresearch:
    dcloud:
      profile: autoresearch
      count: 1
