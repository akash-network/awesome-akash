---
version: "2.0"

services:
  tgpt:
    image: cryptoandcoffee/akash-tgpt:2
    expose:
      - port: 8080
        as: 80
        proto: tcp
        to:
          - global: true
profiles:
  compute:
    tgpt:
      resources:
        cpu:
          units: 8
        memory:
          size: 5Gi #Increase this for larger local memory, can be lower if used external vector for memory.
        storage:
          size: 16Gi
  placement:
    akash:
      pricing:
        tgpt:
          denom: uact
          amount: 10000 #Keep high to show all bids
deployment:
  tgpt:
    akash:
      profile: tgpt
      count: 1
