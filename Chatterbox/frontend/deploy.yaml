---
version: "2.0"

services:
  frontend:
    image: rodrirr/chatterbox-frontend:v1.0.0
    expose:
      - port: 80
        as: 80
        to:
          - global: true

profiles:
  compute:
    frontend:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 512Mi

  placement:
    akash:
      pricing:
        frontend:
          denom: uact
          amount: 100

deployment:
  frontend:
    akash:
      profile: frontend
      count: 1
