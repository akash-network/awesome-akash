---
version: "2.0"
services:
  web:
    image: ghcr.io/decloudnodeslab/nextjs:latest
    expose:
      - port: 3000
        as: 80
        to:
          - global: true
profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.1
        memory:
          size: 512Mi
        storage:
          size: 512Mi
  placement:
    westcoast:
      attributes:
        host: akash
      pricing:
        web: 
          denom: uact
          amount: 10000
deployment:
  web:
    westcoast:
      profile: web
      count: 1
